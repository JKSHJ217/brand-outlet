<!DOCTYPE html>
<html lang="ru">

<head>
<meta charset="UTF-8">
<title>Корзина Brand Outlet</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#111;
color:white;
}

header{
background:#000;
padding:20px 40px;
display:flex;
justify-content:space-between;
}

a{
color:white;
text-decoration:none;
}

h1{
text-align:center;
margin:30px;
}

.cart{
padding:40px;
}

.item{
background:#1c1c1c;
padding:20px;
margin:20px auto;
max-width:500px;
border-radius:15px;
text-align:center;
}

.total{
text-align:center;
font-size:25px;
margin:30px;
}

button{
background:white;
color:black;
padding:12px 25px;
border:none;
border-radius:10px;
cursor:pointer;
}

button:hover{
background:#ddd;
}

</style>

</head>


<body>


<header>

<div>brand_outlet.tm</div>

<a href="index.html">
🏠 Главная
</a>

</header>


<h1>🛒 Ваша корзина</h1>


<div class="cart" id="cart"></div>


<div class="total" id="total"></div>


<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let box = document.getElementById("cart");
let total = 0;


if(cart.length == 0){

box.innerHTML = "<h2 style='text-align:center'>Корзина пуста</h2>";

}else{


cart.forEach(function(item,index){


box.innerHTML += `

<div class="item">

<img src="${item.image}" width="200">

<h2>${item.name}</h2>

<p>${item.price} TMT</p>

<button onclick="removeItem(${index})">
Удалить
</button>

</div>

`;


total += item.price;


});


document.getElementById("total").innerHTML =
"Итого: " + total + " TMT";


}



function removeItem(index){

cart.splice(index,1);

localStorage.setItem("cart",JSON.stringify(cart));

location.reload();

}


</script>


</body>
</html>
