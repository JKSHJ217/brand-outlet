<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>brand_outlet.tm</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#111;
color:white;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
background:#000;
}

.logo{
font-size:28px;
font-weight:bold;
color:#fff;
}

.hero{
height:80vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
}

.hero h1{
font-size:50px;
margin-bottom:20px;
}

.hero p{
font-size:20px;
color:#ccc;
margin-bottom:30px;
}

button{
padding:15px 35px;
font-size:18px;
border:none;
border-radius:10px;
background:#fff;
color:#000;
cursor:pointer;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
padding:40px;
}

.card{
background:#1c1c1c;
border-radius:20px;
padding:20px;
text-align:center;
}

.card img{
width:100%;
border-radius:15px;
}

.price{
font-size:24px;
margin:15px 0;
}

footer{
padding:30px;
text-align:center;
color:#888;
}
</style>

</head>

<body>

<header>

<div class="logo">brand_outlet.tm</div>

<div style="display:flex;gap:20px;align-items:center;">

<a href="favorites.html" style="color:white;text-decoration:none;">
    <div id="favorites-count">❤️ Избранное (0)</div>
</a>

<a href="cart.html" style="color:white;text-decoration:none;">
    <div id="cart-count">🛒 Корзина (0)</div>
</a>

</div>

</header>
<section class="hero">

<h1>Стиль начинается с часов</h1>

<p>Оригинальные брендовые часы по выгодным ценам.</p>

<a href="catalog.html">
  <button>Смотреть каталог</button>
</a>

</section>

<section class="products">

<div class="card">
<img src="https://f.bflcdn.com/f_auto,q_auto/products/26/6/4549526378966_02.JPG">

<h2>Casio Men MQ-24B-7BDF Resin Band Analog Watch 35 mm, White</h2>

<div class="price">1300 TMT</div>

<button onclick="addToCart('Casio Men MQ-24B-7BDF Resin Band Analog Watch 35 mm, White',1300,'https://f.bflcdn.com/f_auto,q_auto/products/26/6/4549526378966_02.JPG')">
Добавить в корзину
</button>

</div>


<div class="card">
<img src="https://picsum.photos/300/300?2">
<h2>Classic Watch</h2>
<div class="price">149 TMT</div>

<button onclick="addToCart('Classic Watch',149)">
Добавить в корзину
</button>
</div>


<div class="card">
<img src="https://picsum.photos/300/300?3">
<h2>Premium Watch</h2>
<div class="price">249 TMT</div>

<button onclick="addToCart('Premium Watch',249)">
Добавить в корзину
</button>
</div>

</section>

<footer>

© 2026 brand_outlet.tm

</footer>

<script src="cart.js"></script>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];
document.getElementById("cart-count").innerHTML =
"🛒 Корзина (" + cart.length + ")";
</script>

</body>
</html>
