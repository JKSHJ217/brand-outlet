<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Brand Outlet - Каталог</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#111;
color:white;
}

header{
background:#000;
padding:20px 40px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:28px;
font-weight:bold;
}

a{
color:white;
text-decoration:none;
}

.catalog{
padding:40px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
}

.card{
background:#1c1c1c;
border-radius:20px;
padding:20px;
text-align:center;
}

.card img{
width:100%;
border-radius:15px;
}

.card h2{
margin:15px 0;
}

.price{
font-size:24px;
margin:15px;
}

button{
background:white;
color:black;
border:none;
padding:12px 25px;
border-radius:10px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#ddd;
}

</style>

</head>

<body>

<header>

<div class="logo">brand_outlet.tm</div>

<a href="index.html">
🏠 Главная
</a>

</header>


<h1 style="text-align:center;margin:30px;">
⌚ Каталог часов
</h1>


<section class="catalog">


<div class="card">

<img src="https://f.bflcdn.com/f_auto,q_auto/products/26/6/4549526378966_02.JPG">

<h2>Casio Men MQ-24B-7BDF Resin Band Analog Watch 35 mm, White</h2>

<div class="price">
1300 TMT
</div>

<button onclick="addToCart('Casio Men MQ-24B-7BDF Resin Band Analog Watch 35 mm, White',1300)">
Добавить в корзину
</button>

</div>



<div class="card">

<img src="https://picsum.photos/300/300?2">

<h2>Fossil Men Watch</h2>

<div class="price">
350 TMT
</div>

<button onclick="addToCart('Fossil Men Watch',350)">
Добавить в корзину
</button>

</div>



<div class="card">

<img src="https://picsum.photos/300/300?3">

<h2>Premium Watch</h2>

<div class="price">
500 TMT
</div>

<button onclick="addToCart('Premium Watch',500)">
Добавить в корзину
</button>

</div>


</section>


<script src="cart.js"></script>

</body>
</html>
