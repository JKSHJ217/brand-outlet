<!DOCTYPE html>
<html>
<head>
    <title>Brand Outlet - Каталог</title>

    <style>
        body{
            font-family:Arial;
            background:#111;
            color:white;
            text-align:center;
        }

        .product{
            background:#222;
            width:300px;
            margin:20px auto;
            padding:20px;
            border-radius:15px;
        }

        button{
            background:white;
            color:black;
            padding:10px 20px;
            border:none;
            border-radius:10px;
            cursor:pointer;
        }

        button:hover{
            background:#ddd;
        }

        img{
            width:250px;
            border-radius:10px;
        }
    </style>
</head>

<body>

<h1>⌚ Каталог Brand Outlet</h1>


<div class="product">
    <h2>Casio Vintage</h2>
    <p>Классические часы Casio</p>
    <p>199 TMT</p>

    <button onclick="addToCart('Casio Vintage',199)">
        Добавить в корзину
    </button>
</div>


<div class="product">
    <h2>Fossil Men Watch</h2>
    <p>Стильные мужские часы</p>
    <p>350 TMT</p>

    <button onclick="addToCart('Fossil Men Watch',350)">
        Добавить в корзину
    </button>
</div>


<div class="product">
    <h2>Premium Watch</h2>
    <p>Элегантный дизайн</p>
    <p>500 TMT</p>

    <button onclick="addToCart('Premium Watch',500)">
        Добавить в корзину
    </button>
</div>


<script src="cart.js"></script>

</body>
</html>
