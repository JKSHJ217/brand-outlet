<!DOCTYPE html>
<html>
<head>
    <title>Brand Outlet - Каталог</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #111;
            color: white;
            text-align: center;
        }

        h1 {
            margin-top: 30px;
        }

        .product {
            background: #222;
            margin: 20px auto;
            padding: 20px;
            width: 300px;
            border-radius: 15px;
        }

        img {
            width: 250px;
            border-radius: 10px;
        }

        button {
            background: white;
            color: black;
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
        }
    </style>
</head>

<body>

<h1>⌚ Каталог Brand Outlet</h1>

<div class="product">
    <h2>Часы Classic</h2>
    <p>Стильные мужские часы</p>
    <p>Цена: 150 TMT</p>
    <button>Заказать</button>
</div>

<div class="product">
    <h2>Часы Premium</h2>
    <p>Элегантный дизайн</p>
    <p>Цена: 250 TMT</p>
    <button>Заказать</button>
</div>

</body>
</html>
