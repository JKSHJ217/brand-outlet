<!DOCTYPE html>
<html>
<head>
    <title>Brand Outlet - Каталог</title>

    <style>
        body{
            font-family:Arial;
            background:#111;
            color:white;
            text-align:center;
        }

        .product{
            background:#222;
            width:300px;
            margin:20px auto;
            padding:20px;
            border-radius:15px;
        }

        button{
            background:white;
            color:black;
            padding:10px 20px;
            border:none;
            border-radius:10px;
            cursor:pointer;
        }

        button:hover{
            background:#ddd;
        }
    </style>
</head>

<body>

<h1>⌚ Каталог Brand Outlet</h1>

<div class="product">
    <h2>Часы Classic</h2>
    <p>Стильные мужские часы</p>
    <p>150 TMT</p>

    <button onclick="addToCart('Часы Classic',150)">
        Добавить в корзину
    </button>
</div>

<div class="product">
    <h2>Часы Premium</h2>
    <p>Элегантный дизайн</p>
    <p>250 TMT</p>

    <button onclick="addToCart('Часы Premium',250)">
        Добавить в корзину
    </button>
</div>

<script src="cart.js"></script>

</body>
</html>
