<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Избранное</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#111;
color:white;
}

header{
background:#000;
padding:20px 40px;
display:flex;
justify-content:space-between;
align-items:center;
}

a{
color:white;
text-decoration:none;
}

h1{
text-align:center;
margin:30px;
}

.box{
max-width:800px;
margin:auto;
padding:30px;
text-align:center;
font-size:24px;
background:#1c1c1c;
border-radius:15px;
}
</style>

</head>

<body>

<header>

<div>❤️ Избранное</div>

<a href="index.html">🏠 Главная</a>

</header>

<h1>❤️ Ваше избранное</h1>

<div class="box" id="favorites">
Проверка...
</div>

<script>

let favorites = JSON.parse(localStorage.getItem("favorites")) || [];

let box = document.getElementById("favorites");


if(favorites.length == 0){

box.innerHTML = "Пока здесь нет товаров ❤️";

}else{

box.innerHTML = "";

favorites.forEach(function(item){

box.innerHTML += `

<div style="background:#222;padding:20px;margin:20px;border-radius:15px;">

<img src="${item.image}" width="200">

<h2>${item.name}</h2>

<p>${item.price} TMT</p>

</div>

`;

});

}

</script>

</body>
</html>
